<!DOCTYPE html>
<html>
<head>
<title>Flipkart Clone</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Flipkart Store</h1>

<a href="/cart">Cart</a>

<div class="products">

{% for p in products %}

<div class="card">

<img src="{{p.image}}" width="150">

<h3>{{p.name}}</h3>

<p>₹{{p.price}}</p>

<a href="/add/{{p.id}}">
<button>Add to Cart</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
